name: Publish review note

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: startsWith(github.event.issue.title, '[Review Note]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish note into review data
        run: node scripts/publish-review-note.mjs

      - name: Commit published review data
        id: commit
        run: |
          if git diff --quiet -- review-notes/published.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review-notes/published.json
          git commit -m "Publish review note from issue #${{ github.event.issue.number }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Close review issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Published to review-notes/published.json. It will appear on the GitHub Pages draft after Pages refreshes."
          gh issue close "$ISSUE_NUMBER"
