<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <pattern id="paper" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#efe3c7"/>
      <path d="M0 12H48M8 0V48M0 36H48M32 0V48" stroke="#d8c7a5" stroke-width="0.45" opacity="0.22"/>
    </pattern>
    <pattern id="wood" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#a77943"/>
      <path d="M0 4C4 1 11 7 16 3M0 11C5 8 10 14 16 10" fill="none" stroke="#6f4a28" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="amberArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#bb7412"/>
    </marker>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#215c9f"/>
    </marker>
    <g id="cam">
      <rect x="-23" y="-14" width="36" height="28" rx="4" fill="#2768b4" stroke="#123f78" stroke-width="3"/>
      <path d="M13 -10L30 -18V18L13 10Z" fill="#2768b4" stroke="#123f78" stroke-width="3"/>
      <rect x="-16" y="-20" width="14" height="7" rx="2" fill="#2768b4" stroke="#123f78" stroke-width="2"/>
    </g>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif;fill:#171717;letter-spacing:1px}
      .room{font:700 32px Arial,Helvetica,sans-serif;fill:#1c1b18;letter-spacing:1px}
      .label{font:700 21px Arial,Helvetica,sans-serif;fill:#211f1b}
      .small{font:700 17px Arial,Helvetica,sans-serif;fill:#211f1b}
      .blue{font:700 20px Arial,Helvetica,sans-serif;fill:#174f91}
      .amber{font:700 20px Arial,Helvetica,sans-serif;fill:#9d5c08}
      .wall{stroke:#262522;stroke-width:22;stroke-linecap:square;fill:none}
      .inner{stroke:#37332c;stroke-width:10;fill:none}
      .sight{stroke:#2768b4;stroke-width:3;stroke-dasharray:10 8;fill:none;marker-end:url(#blueArrow)}
      .dim{stroke:#5c5140;stroke-width:3;stroke-dasharray:8 7;fill:none}
    </style>
  </defs>

  <rect width="1800" height="1000" fill="url(#paper)"/>
  <text x="700" y="50" text-anchor="middle" class="title">WORKING FLOOR PLAN — DIMENSIONAL BLOCKING, NOT TO SCALE</text>

  <!-- Compass -->
  <text x="65" y="95" text-anchor="middle" class="title">N</text>
  <path d="M65 180V115" stroke="#171717" stroke-width="8" marker-end="url(#blueArrow)"/>
  <text x="35" y="470" class="title">W</text>
  <text x="1270" y="470" class="title">E</text>

  <!-- Exterior shell: south remains open -->
  <path class="wall" d="M120 100H1240M120 100V800M1240 100V800"/>
  <path class="dim" d="M120 800H1240"/>
  <text x="680" y="840" text-anchor="middle" class="label">OPEN SOUTH</text>
  <text x="680" y="875" text-anchor="middle" class="title">S</text>

  <!-- Pantry, deeper north-south and extending to west exterior wall -->
  <rect x="131" y="111" width="578" height="219" fill="url(#wood)" opacity="0.9"/>
  <path class="inner" d="M125 335H720M720 100V215M720 305V335"/>
  <text x="420" y="220" text-anchor="middle" class="room">PANTRY</text>

  <!-- Pantry door south of sink counter -->
  <path d="M720 215V305" stroke="#262522" stroke-width="5"/>
  <path d="M720 215A90 90 0 0 1 810 305" fill="none" stroke="#65553f" stroke-width="3"/>
  <path d="M720 215L810 305" stroke="#65553f" stroke-width="4"/>
  <text x="818" y="252" class="small">PANTRY</text>
  <text x="818" y="274" class="small">DOOR</text>

  <!-- North sink counter meets pantry wall -->
  <rect x="720" y="111" width="509" height="58" fill="url(#wood)" stroke="#3a3025" stroke-width="4"/>
  <rect x="930" y="118" width="140" height="45" rx="5" fill="#c6c6bd" stroke="#3f403c" stroke-width="4"/>
  <line x1="1000" y1="120" x2="1000" y2="160" stroke="#555" stroke-width="3"/>
  <circle cx="965" cy="141" r="5" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="1035" cy="141" r="5" fill="none" stroke="#555" stroke-width="2"/>
  <text x="1000" y="195" text-anchor="middle" class="label">SINK + NORTH COUNTER</text>

  <!-- Range shifted south; no counter north; equal-width short counter south -->
  <rect x="720" y="350" width="55" height="90" fill="#262626" stroke="#111" stroke-width="4"/>
  <circle cx="747.5" cy="370" r="12" fill="none" stroke="#b8b8b0" stroke-width="3"/>
  <circle cx="747.5" cy="410" r="12" fill="none" stroke="#b8b8b0" stroke-width="3"/>
  <rect x="720" y="440" width="55" height="90" fill="url(#wood)" stroke="#3a3025" stroke-width="4"/>
  <text x="795" y="395" class="label">RANGE</text>
  <text x="795" y="476" class="small">SAME-WIDTH</text>
  <text x="795" y="498" class="small">SHORT COUNTER</text>

  <!-- Two posts, three-foot opening -->
  <rect x="731" y="537" width="33" height="33" fill="url(#wood)" stroke="#33271b" stroke-width="5"/>
  <rect x="731" y="628" width="33" height="33" fill="url(#wood)" stroke="#33271b" stroke-width="5"/>
  <text x="780" y="562" class="label">POST 1</text>
  <text x="780" y="653" class="label">POST 2</text>
  <path class="dim" d="M747 573V625"/>
  <text x="792" y="608" class="small">3 FT GAP</text>

  <!-- East counter, shelves, book and refrigerator -->
  <rect x="1178" y="111" width="51" height="516" fill="url(#wood)" stroke="#3a3025" stroke-width="4"/>
  <line x1="1188" y1="225" x2="1219" y2="225" stroke="#5a4027" stroke-width="4"/>
  <line x1="1188" y1="270" x2="1219" y2="270" stroke="#5a4027" stroke-width="4"/>
  <text x="1160" y="250" text-anchor="end" class="small">EAST COUNTER</text>
  <text x="1160" y="272" text-anchor="end" class="small">+ SHELVES</text>
  <rect x="1188" y="382" width="31" height="25" fill="#f3e6c8" stroke="#3a3025" stroke-width="3" transform="rotate(8 1203 394)"/>
  <text x="1160" y="390" text-anchor="end" class="small">BOOK</text>
  <rect x="1172" y="655" width="63" height="124" rx="5" fill="#929895" stroke="#313533" stroke-width="5"/>
  <line x1="1177" y1="716" x2="1230" y2="716" stroke="#313533" stroke-width="3"/>
  <text x="1155" y="720" text-anchor="end" class="label">FRIDGE</text>

  <!-- Dining room: 20% narrower, table and exactly three centered windows shifted south -->
  <text x="420" y="390" text-anchor="middle" class="room">DINING ROOM</text>
  <text x="965" y="330" text-anchor="middle" class="room">KITCHEN</text>
  <rect x="410" y="430" width="135" height="300" rx="3" fill="url(#wood)" stroke="#3a3025" stroke-width="5"/>
  <circle cx="477" cy="505" r="8" fill="#d7b878" stroke="#4a351f" stroke-width="2"/>
  <circle cx="477" cy="655" r="8" fill="#d7b878" stroke="#4a351f" stroke-width="2"/>
  <!-- exactly three west-side pitmaster chairs -->
  <g fill="#8c6337" stroke="#3b2a1b" stroke-width="4">
    <rect x="340" y="452" width="48" height="64" rx="16"/>
    <rect x="340" y="548" width="48" height="64" rx="16"/>
    <rect x="340" y="644" width="48" height="64" rx="16"/>
  </g>
  <text x="305" y="740" text-anchor="middle" class="label">3 PITMASTERS</text>
  <!-- Chris mark, no east-side chair -->
  <circle cx="600" cy="580" r="15" fill="#c57b13" stroke="#744407" stroke-width="4"/>
  <text x="600" y="535" text-anchor="middle" class="label">CHRIS START</text>

  <!-- Exactly three west windows, same total span and center as table -->
  <g fill="#d9edf3" stroke="#476c79" stroke-width="4">
    <rect x="108" y="430" width="24" height="90"/>
    <rect x="108" y="535" width="24" height="90"/>
    <rect x="108" y="640" width="24" height="90"/>
  </g>
  <text x="155" y="405" class="small">3 WINDOWS</text>
  <text x="155" y="426" class="small">CENTERED ON TABLE</text>
  <path class="dim" d="M145 430V730"/>

  <!-- Chris movement passes between the two posts -->
  <path d="M600 610C650 620 700 610 747 599C830 580 930 600 1010 560C1080 525 1125 450 1190 400" fill="none" stroke="#bb7412" stroke-width="13" stroke-linecap="round" marker-end="url(#amberArrow)"/>

  <!-- C4: hook camera west of pitmasters -->
  <g transform="translate(250 475)"><use href="#cam"/></g>
  <path class="sight" d="M280 475L585 570"/>
  <text x="220" y="445" class="blue">C4</text>

  <!-- C5: centered exactly on middle pitmaster -->
  <g transform="translate(675 580) rotate(180)"><use href="#cam"/></g>
  <path class="sight" d="M645 580H365"/>
  <text x="680" y="540" class="blue">C5</text>

  <!-- C6: camera physically at center pitmaster POV, looking east/up to Chris -->
  <circle cx="364" cy="580" r="13" fill="#2768b4" stroke="#123f78" stroke-width="4"/>
  <path class="sight" d="M378 580H585"/>
  <text x="320" y="605" text-anchor="end" class="blue">C6 POV</text>

  <!-- C7 moved east; cone captures Chris and Post 2 -->
  <polygon points="900,735 585,555 765,645" fill="#2768b4" opacity="0.12"/>
  <path class="sight" d="M900 735L600 580"/>
  <path class="sight" d="M900 735L747 645"/>
  <g transform="translate(900 735) rotate(-150)"><use href="#cam"/></g>
  <text x="925" y="780" class="blue">C7</text>

  <!-- C8 beside fridge, aimed more directly toward sink; Chris crosses perpendicular -->
  <polygon points="1135,700 930,155 1040,155" fill="#2768b4" opacity="0.11"/>
  <path class="sight" d="M1135 700L985 150"/>
  <g transform="translate(1135 700) rotate(-105)"><use href="#cam"/></g>
  <text x="1095" y="750" class="blue">C8</text>

  <!-- C9 on east counter immediately north of book, looking west toward range/Chris -->
  <polygon points="1200,335 745,365 585,590" fill="#2768b4" opacity="0.11"/>
  <path class="sight" d="M1200 335L760 395"/>
  <path class="sight" d="M1200 335L600 580"/>
  <g transform="translate(1200 335) rotate(180)"><use href="#cam"/></g>
  <text x="1160" y="315" text-anchor="end" class="blue">C9</text>

  <!-- C10 top-down above book -->
  <circle cx="1203" cy="394" r="20" fill="none" stroke="#2768b4" stroke-width="6"/>
  <circle cx="1203" cy="394" r="6" fill="#2768b4"/>
  <path d="M1203 350V372" stroke="#2768b4" stroke-width="5" marker-end="url(#blueArrow)"/>
  <text x="1160" y="425" text-anchor="end" class="blue">C10</text>

  <!-- Camera legend -->
  <rect x="1320" y="105" width="440" height="700" rx="10" fill="#f7ecd3" stroke="#2b2823" stroke-width="5"/>
  <text x="1540" y="150" text-anchor="middle" class="room">CAMERA MAP</text>
  <text x="1360" y="205" class="blue">C4</text><text x="1410" y="205" class="small">Behind pitmasters; east to Chris.</text>
  <text x="1360" y="260" class="blue">C5</text><text x="1410" y="260" class="small">Centered on middle pitmaster.</text>
  <text x="1360" y="315" class="blue">C6</text><text x="1410" y="315" class="small">Middle-pitmaster POV; low to Chris.</text>
  <text x="1360" y="370" class="blue">C7</text><text x="1410" y="370" class="small">East position; Chris plus post.</text>
  <text x="1360" y="425" class="blue">C8</text><text x="1410" y="425" class="small">Beside fridge; toward sink.</text>
  <text x="1360" y="480" class="blue">C9</text><text x="1410" y="480" class="small">On counter above book; west.</text>
  <text x="1360" y="535" class="blue">C10</text><text x="1410" y="535" class="small">Directly overhead on book.</text>
  <path d="M1360 585H1720" stroke="#9f8e70" stroke-width="2"/>
  <text x="1360" y="625" class="small">AMBER: Chris movement</text>
  <text x="1360" y="662" class="small">BLUE DASH: camera axis</text>
  <text x="1360" y="699" class="small">BLUE WASH: field of view</text>
  <text x="1360" y="752" class="small">Dimensions inferred; confirm scout.</text>

  <rect x="300" y="920" width="1000" height="45" fill="none" stroke="#27231e" stroke-width="4"/>
  <text x="800" y="951" text-anchor="middle" class="label">LOCK AXIS AND MOVEMENT; VERIFY DIMENSIONS ON TECH SCOUT.</text>
</svg>
